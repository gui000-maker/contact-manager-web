<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Manager</title>
    <link rel="stylesheet" href="../css/contacts.css" />
    <script type="module" src="../js/contacts.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Contact Manager</h1>
        <button type="button" id="logout-btn">Logout</button>
      </header>

      <!-- Add / Edit contact -->
      <section class="form-section">
        <h2 id="form-title">Add contact</h2>
        <form id="contact-form">
          <input type="hidden" id="contact-id" />

          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="age">Age</label>
            <input
              type="number"
              id="age"
              name="age"
              placeholder="25"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="email@example.com"
            />
          </div>

          <div class="form-group">
            <label for="phoneNumber">Phone</label>
            <input
              type="tel"
              id="phoneNumber"
              name="phoneNumber"
              placeholder="+123456789"
            />
          </div>

          <div id="form-error" class="error-message"></div>

          <div class="form-actions">
            <button type="submit" id="submit-btn">Add contact</button>
            <button type="button" id="cancel-btn" style="display: none">
              Cancel
            </button>
          </div>
        </form>
      </section>

      <!-- Search -->
      <section class="search-section">
        <input type="text" id="search-input" placeholder="Search by name..." />
        <button type="button" id="search-btn">Search</button>
        <button type="button" id="reset-btn">Reset</button>
      </section>

      <!-- Contacts list -->
      <section class="contacts-section">
        <h2>All contacts</h2>
        <div id="contacts-error" class="error-message"></div>
        <div id="loading" style="display: none">Loading...</div>
        <div id="contacts-list"></div>
      </section>

      <!-- Pagination -->
      <div id="pagination">
        <button type="button" id="prev-btn">Previous</button>
        <span id="page-info"></span>
        <button type="button" id="next-btn">Next</button>
      </div>
    </div>
  </body>
</html>
